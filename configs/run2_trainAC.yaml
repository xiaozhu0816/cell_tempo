# Run2 Train-AC: Train on Row A + Row C, Test on held-out A/C + external B
# Classification: MOI5 / MOI1 / MOI0.1 / Mock  (4 classes)
# Regression: time from t0 (hours), uniform for all classes
#
# Split strategy:
#   Row A (a1-a4): 70% train, 30% test-A
#   Row C (c1-c4): 70% train, 30% test-C
#   Row B (b1-b4): 100% external test-B

experiment_name: run2_trainAC

seed: 42

data:
  # Run2 data directory (flat folder with all TIFFs)
  run2_dir: "/isilon/datalake/gurcan_rsch/scratch/WSI/zhengjie/DATA/GMU_cell_1023/HBMVEC/HBMVEC_10X_Run2"

  # Plate layout: column -> MOI condition
  # Column 1 = MOI 5, Column 2 = MOI 1, Column 3 = MOI 0.1, Column 4 = Mock (PBS)
  # Rows a/b/c are biological replicates
  plate_layout:
    a1: moi5
    b1: moi5
    c1: moi5
    a2: moi1
    b2: moi1
    c2: moi1
    a3: moi01
    b3: moi01
    c3: moi01
    a4: mock
    b4: mock
    c4: mock

  # Class label mapping (4 classes)
  class_labels:
    moi5: 0
    moi1: 1
    moi01: 2
    mock: 3

  class_names: ["MOI5", "MOI1", "MOI0.1", "Mock"]

  # Row A + Row C for train/test split; Row B = external test
  train_wells_a: ["a1", "a2", "a3", "a4"]
  train_wells_c: ["c1", "c2", "c3", "c4"]
  external_wells: ["b1", "b2", "b3", "b4"]

  # Split ratio for Row A & Row C positions: 70% train, 30% test
  train_ratio: 0.7
  split_seed: 123

  batch_size: 300
  eval_batch_size_multiplier: 2
  num_workers: 4

  transforms:
    image_size: 512
    crop_border_fraction: 0.05
    random_flip: true
    random_rotation: true
    color_jitter: false
    mean: [0.5, 0.5, 0.5]
    std: [0.25, 0.25, 0.25]

  frames:
    frames_per_hour: 2.0
    # Use ALL frames (0 to end) for all classes uniformly
    window_hours: [0, 46]
    stride: 1

multitask:
  # No onset offset — t0 = 0h for all classes
  infection_onset_hour: 0.0
  clamp_range: [0.0, 46.0]
  classification_weight: 1.0
  regression_weight: 1.0

model:
  name: resnet50
  pretrained: true
  num_classes: 4
  dropout: 0.2
  train_backbone: true
  hidden_dim: 256
  use_cls_conditioning: false

training:
  epochs: 100
  eval_interval: 5      # save checkpoint + evaluate every N epochs
  amp: true
  grad_clip: 1.0

optimizer:
  lr: 0.0001
  weight_decay: 0.0001

scheduler:
  t_max: 100
  eta_min: 0.000001
