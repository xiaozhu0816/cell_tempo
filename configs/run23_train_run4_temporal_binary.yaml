# ──────────────────────────────────────────────────────────────────────
# Experiment: Train on ValRun2 + ValRun3, External test on ValRun4
# WITH temporal context: 3-frame pseudo-RGB input [-6h, -3h, 0h]
# BINARY classification: Infected (MOI5+MOI1+MOI0.1) vs Mock
# ──────────────────────────────────────────────────────────────────────
experiment_name: run23_train_run4_temporal_binary
seed: 42

data:
  train_dirs:
    - /isilon/datalake/gurcan_rsch/scratch/WSI/zhengjie/DATA/GMU_cell_1023/HBMVEC/Validation_Run2_3-11-26/Enhanced contour
    - /isilon/datalake/gurcan_rsch/scratch/WSI/zhengjie/DATA/GMU_cell_1023/HBMVEC/Validation_Run3_3-13-26

  external_dir: /isilon/datalake/gurcan_rsch/scratch/WSI/zhengjie/DATA/GMU_cell_1023/HBMVEC/Validation_Run_4_3-15-26/Enhanced contour

  plate_layout:
    a1: moi5
    b1: moi5
    c1: moi5
    a2: moi1
    b2: moi1
    c2: moi1
    a3: moi01
    b3: moi01
    c3: moi01
    a4: mock
    b4: mock
    c4: mock

  # Binary mapping: all infected conditions → 0, mock → 1
  class_labels:
    moi5: 0
    moi1: 0
    moi01: 0
    mock: 1

  class_names:
    - Infected
    - Mock

  train_ratio: 0.7
  split_seed: 123

  batch_size: 300
  eval_batch_size_multiplier: 2
  num_workers: 4

  transforms:
    image_size: 512
    crop_border_fraction: 0.05
    random_flip: true
    random_rotation: true
    color_jitter: false
    mean: [0.5, 0.5, 0.5]
    std:  [0.25, 0.25, 0.25]

  frames:
    frames_per_hour: 2.0
    window_hours: [0, 47.5]
    stride: 1

  temporal:
    enabled: true
    offsets_hours: [-6, -3, 0]

multitask:
  infection_onset_hour: 0.0
  clamp_range: [0.0, 47.5]
  classification_weight: 1.0
  regression_weight: 1.0

model:
  name: resnet50
  pretrained: true
  num_classes: 2
  dropout: 0.2
  train_backbone: true
  hidden_dim: 256
  use_cls_conditioning: false

training:
  epochs: 100
  amp: true
  grad_clip: 1.0
  eval_interval: 5

optimizer:
  lr: 0.0001
  weight_decay: 0.0001

scheduler:
  t_max: 100
  eta_min: 1.0e-06
